; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-n16r8
src_dir = src

; --- Legacy Arduino build (backup code in src_old/) ---
[env:arduino_legacy]
platform = espressif32@6.5.0
board = adafruit_feather_esp32_v2
framework = arduino
platform_packages = 
build_src_filter =
	-<*>
	+<../src_old/**>
board_build.filesystem = littlefs
board_build.littlefs_dir = data
monitor_speed = 115200
monitor_port = /dev/cu.wchusbserial1130
; NOTE: PlatformIO doesn't support auto-reset on monitor open via platformio.ini.
; Use: `${sysenv.HOME}/.platformio/penv/bin/python scripts/monitor_reset_then_monitor.py $PORT $BAUD $PROJECT_DIR arduino_legacy`
;upload_speed = 576000
upload_speed = 415200 
upload_port = /dev/cu.wchusbserial1130
;upload_port = /dev/tty.usbserial-140
monitor_filters = esp32_exception_decoder
board_build.partitions = 8m4m.csv
build_type = debug
;build_type = release 
lib_deps = 
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.12
	fastled/FastLED@^3.6.0
	Wire
	adafruit/Adafruit BusIO
	adafruit/Adafruit GFX Library
	bitbank2/AnimatedGIF@^2.1.0
	2dom/PxMatrix LED MATRIX library@^1.8.2
	toblum/TetrisAnimation@^1.1.0
	bodmer/TJpg_Decoder@^1.1.0
	me-no-dev/ESP Async WebServer@^1.2.3
	;bblanchon/ArduinoJson@^7.0.4
	bblanchon/ArduinoJson@^6.19.4
	;me-no-dev/ESPAsyncTCP@^1.2.2
	paulstoffregen/Time@^1.6.1
	lennarthennigs/Button2@^2.3.2
	khoih-prog/AsyncTCP_SSL@>=1.3.1
build_flags =
	;-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
	-DLWIP_WND_SCALE=0
	-DTCP_RCV_SCALE=10

; --- ESP-IDF bring-up (current development) ---
[env:hub75_idf]
platform = espressif32@6.5.0
board = adafruit_feather_esp32_v2
framework = espidf
board_build.filesystem = littlefs
board_build.littlefs_dir = data_littlefs
extra_scripts =
	pre:scripts/pio_data_dir_idf.py
	pre:scripts/pio_embed_web_asset.py

monitor_speed = 115200
; monitor_port = /dev/cu.wchusbserial1140
; NOTE: PlatformIO doesn't support auto-reset on monitor open via platformio.ini.
; Use: `${sysenv.HOME}/.platformio/penv/bin/python scripts/monitor_reset_then_monitor.py $PORT $BAUD $PROJECT_DIR hub75_idf`
; 315200 sometimes becomes unstable during frequent flashing/monitoring
upload_speed = 315200
; upload_port = /dev/cu.wchusbserial1140

; Reuse the existing 8MB partition table.
board_build.partitions = 8m4m_littlefs_idf.csv

build_flags =
	-DLV_FONT_MONTSERRAT_8=0
	-DLV_FONT_MONTSERRAT_10=0
	-DLV_FONT_MONTSERRAT_12=0
	-DLV_FONT_MONTSERRAT_14=0
	-DLV_FONT_MONTSERRAT_16=0
	-DLV_FONT_MONTSERRAT_18=0
	-DLV_FONT_MONTSERRAT_20=0
	-DLV_FONT_MONTSERRAT_22=0
	-DLV_FONT_MONTSERRAT_24=0
	-DLV_FONT_MONTSERRAT_26=0
	-DLV_FONT_MONTSERRAT_28=0
	-DLV_FONT_MONTSERRAT_30=0
	-DLV_FONT_MONTSERRAT_32=0
	-DLV_FONT_MONTSERRAT_34=0
	-DLV_FONT_MONTSERRAT_36=0
	-DLV_FONT_MONTSERRAT_38=0
	-DLV_FONT_MONTSERRAT_40=0
	-DLV_FONT_MONTSERRAT_42=0
	-DLV_FONT_MONTSERRAT_44=0
	-DLV_FONT_MONTSERRAT_46=0
	-DLV_FONT_MONTSERRAT_48=0
	-DLV_FONT_MONTSERRAT_28_COMPRESSED=0
	-DLV_FONT_DEJAVU_16_PERSIAN_HEBREW=0
	-DLV_FONT_SOURCE_HAN_SANS_SC_14_CJK=0
	-DLV_FONT_SOURCE_HAN_SANS_SC_16_CJK=0
	-DLV_FONT_UNSCII_8=0
	-DLV_USE_FONT_PLACEHOLDER=0

; ---- Performance / speed tuning (optional) ----
; Hold the BOOT button (GPIO0) while rebooting to run the benchmark.
; build_flags =
;   -DHUB75_I2S_SPEED=HUB75_I2S_CFG::HZ_20M
;   -DHUB75_LATCH_BLANKING=1
;   -DHUB75_MIN_REFRESH_RATE=120

; --- ESP32-S3 N16R8 (16MB Flash / 8MB PSRAM) ---
[env:esp32-s3-n16r8]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1-n16r8
framework = espidf
board_build.filesystem = littlefs
board_build.littlefs_dir = data_littlefs
extra_scripts =
	pre:scripts/pio_data_dir_idf.py
	pre:scripts/pio_embed_web_asset.py
monitor_speed = 115200
upload_speed = 315200
board_upload.flash_size = 16MB

board_build.partitions = 16m12m_littlefs_idf.csv

build_flags =
	${env:hub75_idf.build_flags}
	-DR1_PIN_DEFAULT=4
	-DG1_PIN_DEFAULT=5
	-DB1_PIN_DEFAULT=6
	-DR2_PIN_DEFAULT=7
	-DG2_PIN_DEFAULT=15
	-DB2_PIN_DEFAULT=16
	-DA_PIN_DEFAULT=18
	-DB_PIN_DEFAULT=8
	-DC_PIN_DEFAULT=3
	-DD_PIN_DEFAULT=42
	-DE_PIN_DEFAULT=-1
	-DLAT_PIN_DEFAULT=40
	-DOE_PIN_DEFAULT=39
	-DCLK_PIN_DEFAULT=41
	-DUSER_BUTTON_GPIO=38
