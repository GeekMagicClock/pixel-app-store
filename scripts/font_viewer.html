<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 字体预览 - Auto Load</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .path-info {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-bottom: 20px;
            font-family: monospace;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .control-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .control-group {
            margin-bottom: 0;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .control-group input,
        .control-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .font-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .font-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        
        .font-name {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .font-size-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .font-size-badge.large {
            background: #ffebee;
            color: #c62828;
        }
        
        .preview-container {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .preview-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            border: 1px solid #333;
        }
        
        .zoom-info {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .stat-item {
            background: #f5f5f5;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ffebee;
            background: rgba(244, 67, 54, 0.2);
            border-radius: 12px;
            margin: 20px;
        }
        
        .font-count {
            text-align: center;
            color: white;
            font-size: 1.1em;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        
        @media (max-width: 768px) {
            .control-row {
                grid-template-columns: 1fr;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 ESP32 字体预览</h1>
        <p class="subtitle">64×32 LED 屏幕字体自动加载</p>
        <p class="path-info">📂 data_littlefs/fonts/</p>
        
        <div class="font-count" id="fontCount">⏳ 正在加载字体...</div>
        
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="testText">测试文本:</label>
                    <input type="text" id="testText" value="ABCDEFG&#10;abcdefg&#10;012345678">
                </div>
                
                <div class="control-group">
                    <label for="fontSize">字号 (px):</label>
                    <input type="number" id="fontSize" value="8" min="6" max="16">
                </div>
                
                <div class="control-group">
                    <label for="zoomLevel">缩放:</label>
                    <select id="zoomLevel">
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="4" selected>4x</option>
                        <option value="6">6x</option>
                        <option value="8">8x</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="sortBy">排序:</label>
                    <select id="sortBy">
                        <option value="size">大小</option>
                        <option value="name">名称</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="fontGrid" class="grid">
            <div class="loading">⏳ 正在加载字体...</div>
        </div>
    </div>

    <script>
        const SCREEN_WIDTH = 64;
        const SCREEN_HEIGHT = 32;
        const API_BASE = '/api';
        
        let allFonts = [];
        let loadedFonts = [];
        
        // 监听控制变化
        document.getElementById('testText').addEventListener('input', updateAllPreviews);
        document.getElementById('fontSize').addEventListener('input', updateAllPreviews);
        document.getElementById('zoomLevel').addEventListener('change', updateAllPreviews);
        document.getElementById('sortBy').addEventListener('change', renderFontGrid);
        
        // 初始化
        async function init() {
            try {
                const response = await fetch(`${API_BASE}/fonts`);
                if (!response.ok) throw new Error('无法连接到服务器');
                
                allFonts = await response.json();
                
                if (allFonts.length === 0) {
                    showError('data_littlefs/fonts/ 目录为空');
                    return;
                }
                
                document.getElementById('fontCount').innerHTML = 
                    `✅ 已找到 <strong>${allFonts.length}</strong> 个字体文件`;
                
                await loadAllFonts();
                renderFontGrid();
            } catch (error) {
                showError(`加载失败: ${error.message}<br>请确保运行了 font_server.py`);
            }
        }
        
        async function loadAllFonts() {
            const promises = allFonts.map(async (fontInfo) => {
                try {
                    const response = await fetch(`${API_BASE}/font/${fontInfo.filename}`);
                    const blob = await response.blob();
                    const arrayBuffer = await blob.arrayBuffer();
                    
                    const fontFace = new FontFace(fontInfo.name, arrayBuffer);
                    await fontFace.load();
                    document.fonts.add(fontFace);
                    
                    loadedFonts.push({
                        ...fontInfo,
                        loaded: true
                    });
                } catch (error) {
                    console.error(`加载字体失败: ${fontInfo.name}`, error);
                    loadedFonts.push({
                        ...fontInfo,
                        loaded: false,
                        error: error.message
                    });
                }
            });
            
            await Promise.all(promises);
        }
        
        function renderFontGrid() {
            const grid = document.getElementById('fontGrid');
            grid.innerHTML = '';
            
            // 排序
            const sortBy = document.getElementById('sortBy').value;
            const sorted = [...loadedFonts].sort((a, b) => {
                if (sortBy === 'name') {
                    return a.name.localeCompare(b.name);
                }
                return a.size - b.size;
            });
            
            sorted.forEach((font, index) => {
                if (font.loaded) {
                    const card = createFontCard(font, index);
                    grid.appendChild(card);
                }
            });
        }
        
        function createFontCard(font, index) {
            const card = document.createElement('div');
            card.className = 'font-card';
            
            const isLarge = font.size > 150 * 1024;
            
            card.innerHTML = `
                <div class="font-name">
                    <span title="${font.filename}">${font.name}</span>
                    <span class="font-size-badge ${isLarge ? 'large' : ''}">${font.size_kb} KB</span>
                </div>
                <div class="preview-container">
                    <canvas class="preview-canvas" id="canvas-${index}"></canvas>
                    <div class="zoom-info">${document.getElementById('zoomLevel').value}x</div>
                </div>
                <div class="stats">
                    <div class="stat-item">📺 ${SCREEN_WIDTH}×${SCREEN_HEIGHT}px</div>
                    <div class="stat-item">🔤 ${document.getElementById('fontSize').value}px</div>
                </div>
            `;
            
            setTimeout(() => renderFontPreview(font, index), 10);
            return card;
        }
        
        function renderFontPreview(font, index) {
            const canvas = document.getElementById(`canvas-${index}`);
            if (!canvas) return;
            
            const zoom = parseInt(document.getElementById('zoomLevel').value);
            
            canvas.width = SCREEN_WIDTH;
            canvas.height = SCREEN_HEIGHT;
            canvas.style.width = (SCREEN_WIDTH * zoom) + 'px';
            canvas.style.height = (SCREEN_HEIGHT * zoom) + 'px';
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
            
            let text = document.getElementById('testText').value.replace(/\\n/g, '\n');
            const fontSize = parseInt(document.getElementById('fontSize').value);
            
            ctx.font = `${fontSize}px "${font.name}"`;
            ctx.fillStyle = '#fff';
            ctx.textBaseline = 'top';
            
            const lines = text.split('\n');
            const lineHeight = fontSize * 1.2;
            
            lines.forEach((line, i) => {
                ctx.fillText(line, 2, 2 + i * lineHeight);
            });
        }
        
        function updateAllPreviews() {
            loadedFonts.forEach((font, index) => {
                if (font.loaded) {
                    renderFontPreview(font, index);
                }
            });
            
            document.querySelectorAll('.zoom-info').forEach(el => {
                el.textContent = document.getElementById('zoomLevel').value + 'x';
            });
            
            document.querySelectorAll('.stats').forEach(stats => {
                const items = stats.querySelectorAll('.stat-item');
                items[1].textContent = `🔤 ${document.getElementById('fontSize').value}px`;
            });
        }
        
        function showError(message) {
            const grid = document.getElementById('fontGrid');
            grid.innerHTML = `<div class="error">❌ ${message}</div>`;
            document.getElementById('fontCount').innerHTML = '❌ 加载失败';
        }
        
        // 启动
        init();
    </script>
</body>
</html>
