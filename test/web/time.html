<!Doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=0.8, minimal-ui">
		<meta name="author" content="GEEKMAGIC">
		<meta name="theme-color" content="#36393E" />
		<link rel="stylesheet" href="css/style.css">
		<script src="js/jquery.min.js"></script>
	</head>
	<body onload = "getData('/.sys/tz.json');getData('/.sys/hour12.json');getData('/.sys/ntp.json');getData('/.sys/day.json');getData('/.sys/timecolor.json');getData('/.sys/colon.json');getData('/.sys/dst.json');getNav();">
		<nav id="nav" style="width: 80%;margin: 0 auto;font-size: 25px;text-align: center;">
		</nav>		
		<div class="container">
			<div class="row">
				<div class="col-12">
					<div id="popup" class="popup"></div>
					<h1>1. Time Zone</h1>
				</div>
				<div class="col-12">
					TimeZone: 
				<select id="timezone">
					<option value="-12">
						UTC-12:00 - International Date Line West
					</option>
					<option value="-11">
					UTC-11:00 - Samoa Standard Time
					</option>
					<option value="-10">
					UTC-10:00 - Hawaii-Aleutian Standard Time
					</option>
					<option value="-9">
					UTC-9:00 - Alaska Standard Time
					</option>
					<option value="-8">
					UTC-8:00 - Pacific Standard Time
					</option>
					<option value="-7">
					UTC-7:00 - Mountain Standard Time
					</option>
					<option value="-6">
					UTC-6:00 - Central Standard Time
					</option>
					<option value="-5">
					UTC-5:00 - Eastern Standard Time
					</option>
					<option value="-4">
					UTC-4:00 - Atlantic Standard Time
					</option>
					<option value="-3">
					UTC-3:00 - Argentina, Brazil, Uruguay Standard Time
					</option>
					<option value="-2">
					UTC-2:00 - Brasilia Standard Time
					</option>
					<option value="-1">
					UTC-1:00 - Cape Verde, Azores Standard Time
					</option>
					<option value="0">
					UTC+0:00 - Greenwich Mean Time
					</option>
					<option value="1">
					UTC+1:00 - Central European Time
					</option>
					<option value="2">
					UTC+2:00 - Eastern European Time
					</option>
					<option value="3">
					UTC+3:00 - Moscow Standard Time
					</option>
					<option value="4">
					UTC+4:00 - Azerbaijan Standard Time
					</option>
					<option value="5">
					UTC+5:00 - Pakistan Standard Time
					</option>
					<option value="6">
					UTC+6:00 - Bangladesh Standard Time
					</option>
					<option value="7">
					UTC+7:00 - Indochina Time
					</option>
					<option value="8">
					UTC+8:00 - China, Singapore Standard Time
					</option>
					<option value="9">
					UTC+9:00 - Japan Standard Time
					</option>
					<option value="10">
					UTC+10:00 - Australian Eastern Standard Time
					</option>
					<option value="11">
					UTC+11:00 - Vanuatu Standard Time
					</option>
				</select><p>
					MinuteOffset: 
				<select id="mtimezone">
					<option value="0">
						0 Minute
					</option>
					<option value="15">
						15 Minutes
					</option>
					<option value="30">
						30 Minutes
					</option>
					<option value="45">
						45 Minutes
					</option>
				</select><p>
				<button class="button-primary left" onclick="set_timezone()">Save</button>
				</div>
			</div>
			<div class="row">
				<div class="col-12">
					<div id="popup" class="popup"></div>
					<h1>2. Time Number Color</h1>
				</div>
			</div>
			<div class="row">
				<div class="col-3">
					<label for="enc">Hour：</label>
				</div>
				<div class="col-9">
					<input type="color" id="hc" name="hc" value="#FFFFFF"/>
				</div>
				<div class="col-3">
					<label for="enc">Minutes：</label>
				</div>
				<div class="col-9">
					<input type="color" id="mc" name="mc" value="#FEBA01" />
				</div>
				<div class="col-3">
					<label for="enc">Seconds：</label>
				</div>
				<div class="col-9">
					<input type="color" id="sc" name="sc" value="#FF5900" />
				</div>				
				<div class="col-3">
					<label >Colon：</label>
				</div>
				<div class="col-9">
					<input type="color" id="cc" value="#FF5900" />
				</div>
				<div class="col-12">
				<button class="button-primary left" onclick="set_timecolor()">SAVE</button>
				</div>	
			</div>
			<div class="row">
				<div class="col-12">
					<div id="error" class="hide"></div>
					<h1>3. 12/24 Hour Format</h1>
				</div>
			</div>
			<div class="row">
				<div class="col-4">
					<span>Enable:</span>
					<label class="switch">
						<input type="checkbox" class="switch-input" id="hour12">
						<span class="slider round"></span>
					</label>
				</div>
			</div>
			<div class="row">
				<div class="col-12">
					<div id="error" class="hide"></div>
					<h1>4. Date Format</h1>
				</div>
			</div>
			<div class="row">
				<div class="col-6">
					<select id="day-format" onchange="setDayFormat(this)" style="width:150px">
					  <option value="-1" style="display:none">DD/MM/YYYY</option>
					  <option value="1">DD/MM/YYYY</option>
					  <option value="2">YYYY/MM/DD</option>
					  <option value="3">MM/DD/YYYY</option>
					  <option value="4">MM/DD</option>
					  <option value="5">DD/MM</option>
					  <option value="6">day-th/Month</option>
					</select>
				</div>	
			</div>						
			<div class="row">
				<div class="col-12">
					<h1>5. Ntp Time server</h1>
				</div>
			</div>
			<div class="row">
				<div class="col-12">
				<label>The device has multiple sets of time servers built in to ensure correct time synchronization. If you set your own NTP time server, it will be used first to synchronize.</label><p>
				<label>In most cases, you do not need this.</label>
				</div>
				<div class="col-12">
					NTP Server Domain: <input type="text" name="ntp" id="ntp" placeholder="pool.ntp.org">
				</div>
				<div class="col-12">
				<button class="button-primary left" onclick="set_ntp()">SAVE</button>
				</div>	
			</div>
			<div class="row">
				<div class="col-12">
					<div id="error" class="hide"></div>
					<h1>5. DST(Daylight Saving Time) enable</h1>
				</div>
				<div class="col-12">
					<label>Do not enable it unless your time is incorrect!</label><p>
				</div>
			</div>
			<div class="row">
				<div class="col-4">
					<span>Enable:</span>
					<label class="switch">
						<input type="checkbox" class="switch-input" id="dst">
						<span class="slider round"></span>
					</label>
				</div>
			</div>
			<div class="row">
				<div class="col-12">
					<br />
					<div id="copyright">
					</div>						
					<script src="js/settings.js"></script>
				</div>
			</div>
		</div>
		<script>
			$('#hour12').change(function() {
				var hour12 = getE('hour12').checked;
				if ($(this).is(':checked')) {
					console.log('Switch is ON');
				} else {
					console.log('Switch is OFF');
				}
				if(hour12 == true) hour=1;
				else hour=0;
				var url = "/set?hour="+hour;
				console.log(url);
				send_http(url);
			});
			function set_timezone(){
				var tz = $('#timezone').val();
				var mtz = $('#mtimezone').val();
				var url = "/set?tz="+tz+"&mtz="+mtz;
				send_http(url);	
			}
			function setDayFormat(ele){
				var url = "/set?day="+ele.value;
				send_http(url);	
			}
			function set_timecolor(){
				var hc = getE('hc');
				var mc = getE('mc');
				var sc = getE('sc');				
				var cc = getE('cc');				
				var url = "/set?cc="+escape(cc.value)+"&hc="+escape(hc.value)+"&mc="+encodeURIComponent(mc.value)+"&sc="+encodeURIComponent(sc.value);
				console.log(url);
				send_http(url);				
			}		
			function set_hour12(){
				var hour12 = getE('hour12').checked;
				if(hour12 == true) hour=1;
				else hour=0;
				var url = "/set?hour="+hour;
				console.log(url);
				send_http(url);				
			}
			function set_font(){
				var font = getE('font').value;
				var url = "/set?font="+font;
				console.log(url);
				send_http(url);				
			}			
			function set_colon(){
				var colon = getE('colon').checked;
				if(colon == true) colon=1;
				else colon=0;
				var url = "/set?colon="+colon;
				console.log(url);
				send_http(url);				
			}
			function set_ntp(){
				var ntp = getE('ntp').value;
				var url = "/set?ntp="+ntp.replace(/ /g,"");
				console.log(url);
				send_http(url);				
			}
			function set_interval(){
				var interval = getE('time_interval').value;
				var url = "/set?time_interval="+interval.replace(/ /g,"");
				console.log(url);
				send_http(url);				
			}
			function set_dst(){				
				var dst = getE('dst').checked;
				if(dst == true) dst=1;
				else dst=0;
				var url = "/set?dst="+dst;
				console.log(url);
				send_http(url);				
			}
			function set_daytimer(){
				var yr = getE('yr').value.replace(/ /g,"");
				var mth = getE('mth').value.replace(/ /g,"");
				var day = getE('day').value.replace(/ /g,"");
				if(!Number.isInteger(parseInt(yr)) || !Number.isInteger(parseInt(mth)) || !Number.isInteger(parseInt(day)) || parseInt(day)>31 || parseInt(mth) >12 )
				{ alert("Please check the date is valid！");return;}
				
				var url = "/set?yr="+yr+"&mth="+mth+"&day="+day;
				console.log(url);
				send_http(url);				
			}
		</script>				
	</body>
</html>
