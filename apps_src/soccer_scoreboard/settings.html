<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sports Scoreboard Settings</title>
  <style>
    body { margin: 0; padding: 12px; font: 14px/1.4 -apple-system, Segoe UI, sans-serif; background: #fffaf2; color: #2f251c; }
    h1 { margin: 0 0 6px; font-size: 16px; }
    .hint { margin: 0 0 10px; color: #6b5a47; font-size: 12px; }
    .row { margin: 0 0 10px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    input, select, button { font: inherit; }
    input, select { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d8c8b3; border-radius: 8px; background: #fff; }
    details { margin: 6px 0 10px; border: 1px solid #e4d8c8; border-radius: 10px; background: #fff; }
    summary { cursor: pointer; padding: 8px 10px; font-size: 12px; font-weight: 700; color: #5b4838; }
    .advanced { padding: 0 10px 10px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { padding: 8px 12px; border: 0; border-radius: 999px; background: #efe2d3; color: #2f251c; }
    button.primary { background: #b8582f; color: #fff; }
    button.ghost { background: #f4ece1; }
    .status { margin-top: 8px; font-size: 12px; min-height: 16px; white-space: pre-wrap; }
    .ok { color: #2f8a4f; }
    .bad { color: #a03224; }
    @media (max-width: 460px) { .split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Sports Scoreboard</h1>
  <p class="hint">Pick sport, league, and team. The app will keep one key game in focus.</p>

  <div class="row">
    <label for="sport">Sport</label>
    <select id="sport"></select>
  </div>

  <div class="row">
    <label for="league">League</label>
    <select id="league"></select>
  </div>

  <div class="row">
    <label for="team">Team Focus</label>
    <select id="team"></select>
  </div>
  <div class="split">
    <div class="row">
      <label for="rotateSec">Detail Switch (seconds)</label>
      <input id="rotateSec" type="number" min="1" max="20" step="1" value="4">
    </div>
    <div class="row">
      <label for="autoPage">Auto Page Switch</label>
      <select id="autoPage">
        <option value="1">On</option>
        <option value="0">Off</option>
      </select>
    </div>
  </div>

  <div class="split">
    <div class="row">
      <label for="refreshSec">Refresh Interval (seconds)</label>
      <input id="refreshSec" type="number" min="10" max="600" step="5" value="60">
    </div>
  </div>
  <div class="actions">
    <button id="saveRun" class="primary" type="button">Save & Run</button>
  </div>
  <div id="status" class="status"></div>

  <script>
    const APP_ID = "soccer_scoreboard";
    const FORCED_SPORT = "soccer";
    const LEAGUES = [{"code":"eng.1","name":"Premier League","teams":[["BOU","AFC Bournemouth","349"],["ARS","Arsenal","359"],["AVL","Aston Villa","362"],["BRE","Brentford","337"],["BHA","Brighton & Hove Albion","331"],["BUR","Burnley","379"],["CHE","Chelsea","363"],["CRY","Crystal Palace","384"],["EVE","Everton","368"],["FUL","Fulham","370"],["LEE","Leeds United","357"],["LIV","Liverpool","364"],["MNC","Manchester City","382"],["MAN","Manchester United","360"],["NEW","Newcastle United","361"],["NFO","Nottingham Forest","393"],["SUN","Sunderland","366"],["TOT","Tottenham Hotspur","367"],["WHU","West Ham United","371"],["WOL","Wolverhampton Wanderers","380"]]},{"code":"esp.1","name":"La Liga","teams":[["ALA","Alavés","96"],["ATH","Athletic Club","93"],["ATM","Atlético Madrid","1068"],["BAR","Barcelona","83"],["CEL","Celta Vigo","85"],["ELC","Elche","3751"],["ESP","Espanyol","88"],["GET","Getafe","2922"],["GIR","Girona","9812"],["LEV","Levante","1538"],["MLL","Mallorca","84"],["OSA","Osasuna","97"],["RAY","Rayo Vallecano","101"],["BET","Real Betis","244"],["RMA","Real Madrid","86"],["OVI","Real Oviedo","92"],["RSO","Real Sociedad","89"],["SEV","Sevilla","243"],["VAL","Valencia","94"],["VIL","Villarreal","102"]]},{"code":"ger.1","name":"Bundesliga","teams":[["HDH","1. FC Heidenheim 1846","6418"],["FCU","1. FC Union Berlin","598"],["B04","Bayer Leverkusen","131"],["MUN","Bayern Munich","132"],["DOR","Borussia Dortmund","124"],["BMG","Borussia Mönchengladbach","268"],["SGE","Eintracht Frankfurt","125"],["FCA","FC Augsburg","3841"],["KOE","FC Cologne","122"],["HSV","Hamburg SV","127"],["M05","Mainz","2950"],["RBL","RB Leipzig","11420"],["SCF","SC Freiburg","126"],["STP","St. Pauli","270"],["TSG","TSG Hoffenheim","7911"],["VFB","VfB Stuttgart","134"],["WOB","VfL Wolfsburg","138"],["SVW","Werder Bremen","137"]]},{"code":"ita.1","name":"Serie A","teams":[["MIL","AC Milan","103"],["ROMA","AS Roma","104"],["ATA","Atalanta","105"],["BOL","Bologna","107"],["CAG","Cagliari","2925"],["COMO","Como","2572"],["CRE","Cremonese","4050"],["FIO","Fiorentina","109"],["GEN","Genoa","3263"],["VER","Hellas Verona","119"],["INT","Internazionale","110"],["JUV","Juventus","111"],["LAZ","Lazio","112"],["LEC","Lecce","113"],["NAP","Napoli","114"],["PAR","Parma","115"],["PIS","Pisa","3956"],["SAS","Sassuolo","3997"],["TOR","Torino","239"],["UDI","Udinese","118"]]}];

    const el = {
      sport: document.getElementById("sport"),
      league: document.getElementById("league"),
      team: document.getElementById("team"),
      rotateSec: document.getElementById("rotateSec"),
      autoPage: document.getElementById("autoPage"),
      refreshSec: document.getElementById("refreshSec"),
      teamId: document.getElementById("teamId"),
      eventId: document.getElementById("eventId"),
      saveRun: document.getElementById("saveRun"),
      status: document.getElementById("status")
    };

    function setStatus(msg, cls) {
      el.status.textContent = msg || "";
      el.status.className = "status" + (cls ? " " + cls : "");
    }

    async function api(method, path, payload) {
      const response = await fetch(path, {
        method,
        headers: payload === undefined ? {} : { "Content-Type": "application/json" },
        body: payload === undefined ? undefined : JSON.stringify(payload),
        cache: "no-store"
      });
      const text = await response.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch (_) {}
      if (!response.ok) {
        const detail = json && json.error ? " (" + json.error + ")" : "";
        throw new Error("Request failed " + response.status + detail);
      }
      return json;
    }

    function setSelectOptions(node, options, value) {
      node.innerHTML = "";
      for (const item of options) {
        const opt = document.createElement("option");
        opt.value = item.value;
        opt.textContent = item.label;
        if (item.teamId) opt.teamId = item.teamId;
        node.appendChild(opt);
      }
      if (value != null && value !== "") node.value = value;
    }
        function lockSportField() {
      if (!el.sport) return;
      el.sport.value = FORCED_SPORT;
      el.sport.disabled = true;
      const row = el.sport.closest ? el.sport.closest(".row") : null;
      if (row) row.style.display = "none";
    }

function selectedSportDef() {
      return { leagues: LEAGUES };
    }

    function selectedLeagueDef() {
      const sportDef = selectedSportDef();
      const code = fieldValue(el.league, "eng.1");
      for (const l of sportDef.leagues) {
        if (l.code === code) return l;
      }
      return sportDef.leagues[0];
    }

    async function rebuildLeague(preferredLeague, preferredTeam) {
      const sportDef = selectedSportDef();
      const leagues = (sportDef && Array.isArray(sportDef.leagues)) ? sportDef.leagues : [];
      if (!leagues.length) {
        setSelectOptions(el.league, [{ value: "eng.1", label: "Premier League" }], "eng.1");
        await rebuildTeamOptions(preferredTeam || "");
        return;
      }
      const options = leagues.map(function (l) { return { value: l.code, label: l.name || l.code }; });
      const want = (preferredLeague || "").trim();
      const fallback = leagues[0].code;
      const chosen = options.some(function (x) { return x.value === want; }) ? want : fallback;
      setSelectOptions(el.league, options, chosen);
      await rebuildTeamOptions(preferredTeam || "");
    }

    async function rebuildLeagueOptions(preferredLeague, preferredTeam) {
      return rebuildLeague(preferredLeague, preferredTeam);
    }

    async function rebuildTeamOptions(preferredTeam) {
      const leagueDef = selectedLeagueDef();
      const sourceTeams = leagueDef.teams || [];
      const options = [{ value: "", label: "Auto Pick Best Game" }];
      for (const t of sourceTeams) {
        options.push({ value: t[0], label: t[0] + " - " + t[1], teamId: t[2] || "" });
      }
      setSelectOptions(el.team, options, preferredTeam || "");
      const current = sourceTeams.find(function (x) { return x[0] === fieldValue(el.team); });
      if (el.team && el.team.dataset) el.team.dataset.teamId = current && current[2] ? current[2] : "";
    }

    function selectedTeamId() {
      const option = el.team && el.team.options ? el.team.options[el.team.selectedIndex] : null;
      if (option && option.teamId) return option.teamId;
      return el.team && el.team.dataset ? (el.team.dataset.teamId || "") : "";
    }

    function normalizeInt(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      const v = Math.round(n);
      if (v < min) return min;
      if (v > max) return max;
      return v;
    }

    function fieldValue(node, fallback) {
      if (!node) return fallback == null ? "" : String(fallback);
      return String(node.value == null ? "" : node.value);
    }

    function collectItems() {
      const sport = FORCED_SPORT;
      const league = fieldValue(el.league, "eng.1") || "eng.1";      const team = fieldValue(el.team).trim().toUpperCase();

      return {
        "soccer_scoreboard.sport": sport,
        "soccer_scoreboard.league": league,
        "soccer_scoreboard.team": team || null,
        "soccer_scoreboard.team_id": fieldValue(el.teamId).trim() || selectedTeamId() || null,
        "soccer_scoreboard.event_id": fieldValue(el.eventId).trim() || null,
        "soccer_scoreboard.auto_page": fieldValue(el.autoPage, "1") === "0" ? "0" : "1",
        "soccer_scoreboard.rotate_sec": normalizeInt(fieldValue(el.rotateSec, "4"), 1, 20, 4),
        "soccer_scoreboard.refresh_sec": normalizeInt(fieldValue(el.refreshSec, "60"), 10, 600, 60)
      };
    }

    function explain(items) {
      const team = items["soccer_scoreboard.team"] || "Auto Pick";
      const lines = [
        "Sport: " + items["soccer_scoreboard.sport"],
        "League: " + items["soccer_scoreboard.league"],
        "Team: " + team,
        "Auto Page: " + (items["soccer_scoreboard.auto_page"] === "0" ? "Off" : "On"),
        "Refresh: " + items["soccer_scoreboard.refresh_sec"] + "s"
      ];
      if (items["soccer_scoreboard.event_id"]) lines.push("Locked Game: " + items["soccer_scoreboard.event_id"]);
      return lines.join("\n");
    }

    async function save(runAfter) {
      if (el.saveRun) el.saveRun.disabled = true;
      try {
        const items = collectItems();
        setStatus("Saving...");
        await api("POST", "/api/system/settings", { items: items });
        await api("POST", "/api/apps/switch/" + encodeURIComponent(APP_ID), {});
        setStatus("Saved and applied.\n" + explain(items), "ok");
      } catch (e) {
        setStatus(String(e && e.message || e), "bad");
      } finally {
        if (el.saveRun) el.saveRun.disabled = false;
      }
    }

    async function load() {
      const json = await api("GET", "/api/system/settings");
      const items = json && typeof json.items === "object" ? json.items : {};

      const sportOptions = [{ value: FORCED_SPORT, label: "Soccer" }];
      setSelectOptions(el.sport, sportOptions, FORCED_SPORT);
      lockSportField();
      await rebuildLeagueOptions(String(items["soccer_scoreboard.league"] || ""), String(items["soccer_scoreboard.team"] || ""));
      if (el.autoPage) el.autoPage.value = String(items["soccer_scoreboard.auto_page"] || "1") === "0" ? "0" : "1";
      if (el.rotateSec) el.rotateSec.value = String(items["soccer_scoreboard.rotate_sec"] || "4");
      if (el.refreshSec) el.refreshSec.value = String(items["soccer_scoreboard.refresh_sec"] || "60");
      if (el.teamId) el.teamId.value = String(items["soccer_scoreboard.team_id"] || "");
      if (el.eventId) el.eventId.value = String(items["soccer_scoreboard.event_id"] || "");
    }

    el.sport.onchange = function () { rebuildLeagueOptions("", "").catch(function () {}); };
    el.league.onchange = function () { rebuildTeamOptions("").catch(function () {}); };
    el.team.onchange = function () {
      const option = el.team.options[el.team.selectedIndex];
      if (el.team.dataset) el.team.dataset.teamId = option && option.teamId ? option.teamId : "";
    };
    if (el.saveRun) el.saveRun.onclick = function () { save(true); };

    load().then(function () { setStatus("Loaded.", "ok"); }).catch(function (e) { setStatus(String(e && e.message || e), "bad"); });
  </script>
</body>
</html>
