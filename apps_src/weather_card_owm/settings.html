<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Card Settings</title>
  <style>
    :root {
      --bg: #fffaf2;
      --card: #fffdf9;
      --line: #d8c8b3;
      --text: #2f251c;
      --muted: #766251;
      --accent: #b8582f;
      --ok: #2f8a4f;
      --bad: #a03224;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 14px;
    }
    .card {
      background: transparent;
      padding: 0;
    }
    .title {
      margin: 0 0 4px 0;
      font-size: 16px;
      font-weight: 700;
    }
    .row {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    label {
      font-weight: 600;
      font-size: 12px;
    }
    input, select, button {
      font: inherit;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      background: #efe2d3;
      color: var(--text);
    }
    button.primary {
      background: var(--accent);
      color: #fff;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }
    .status.ok { color: var(--ok); }
    .status.bad { color: var(--bad); }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Weather Card</h1>

    <div class="row">
      <label for="city">City</label>
      <input id="city" type="text" placeholder="kuala lumpur,my" />
    </div>

    <div class="row">
      <label for="units">Temperature Unit</label>
      <select id="units">
        <option value="metric">Celsius</option>
        <option value="imperial">Fahrenheit</option>
      </select>
    </div>

    <div class="row">
      <label for="refreshMs">Refresh Interval (ms)</label>
      <input id="refreshMs" type="number" min="15000" max="3600000" step="1000" />
    </div>

    <div class="actions">
      <button id="saveBtn" type="button">Save</button>
      <button id="saveRunBtn" class="primary" type="button">Save & Run</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const APP_ID = "weather_card_owm";
    const DEFAULTS = {
      city: "zhongshangang,cn",
      units: "metric",
      refresh_ms: 300000,
    };

    const cityEl = document.getElementById("city");
    const unitsEl = document.getElementById("units");
    const refreshEl = document.getElementById("refreshMs");
    const saveBtn = document.getElementById("saveBtn");
    const saveRunBtn = document.getElementById("saveRunBtn");
    const statusEl = document.getElementById("status");

    async function api(method, path, payload) {
      const body = payload === undefined ? undefined : JSON.stringify(payload);
      const response = await fetch(path, {
        method,
        headers: payload === undefined ? {} : { "Content-Type": "application/json" },
        body,
        cache: "no-store",
      });
      const text = await response.text();
      let json = {};
      try {
        json = text ? JSON.parse(text) : {};
      } catch (_) {
        json = {};
      }
      if (!response.ok) {
        const detail = json && typeof json.error === "string" && json.error ? " (" + json.error + ")" : "";
        throw new Error(method + " " + path + " -> HTTP " + response.status + detail);
      }
      return json;
    }

    function setStatus(text, kind) {
      statusEl.textContent = text || "";
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function clamp(v, lo, hi) {
      if (v < lo) return lo;
      if (v > hi) return hi;
      return v;
    }

    async function loadValues() {
      const json = await api("GET", "/api/system/settings");
      const items = json && typeof json.items === "object" ? json.items : {};
      const city = String(items["weather_card_owm.city"] ?? DEFAULTS.city).trim();
      let units = String(items["weather_card_owm.units"] ?? DEFAULTS.units).toLowerCase();
      if (units !== "imperial") units = "metric";
      const refreshMs = Number(items["weather_card_owm.refresh_ms"] ?? DEFAULTS.refresh_ms);
      cityEl.value = city || DEFAULTS.city;
      unitsEl.value = units;
      refreshEl.value = String(clamp(Number.isFinite(refreshMs) ? Math.round(refreshMs) : DEFAULTS.refresh_ms, 15000, 3600000));
    }

    async function saveValues(runAfterSave) {
      const city = String(cityEl.value || "").trim();
      if (!city) throw new Error("City is required");
      const units = unitsEl.value === "imperial" ? "imperial" : "metric";
      const refreshRaw = Number(refreshEl.value || DEFAULTS.refresh_ms);
      if (!Number.isFinite(refreshRaw)) {
        throw new Error("Refresh interval must be a number");
      }
      const refreshMs = clamp(Math.round(refreshRaw), 15000, 3600000);

      const items = {
        "weather_card_owm.city": city,
        "weather_card_owm.units": units,
        "weather_card_owm.refresh_ms": refreshMs,
      };

      await api("POST", "/api/system/settings", { items });
      await api("POST", "/api/apps/switch/" + encodeURIComponent(APP_ID), {});
    }

    async function onSave(runAfterSave) {
      saveBtn.disabled = true;
      saveRunBtn.disabled = true;
      try {
        setStatus("Saving...", "");
        await saveValues(runAfterSave);
        setStatus("Saved and applied.", "ok");
      } catch (error) {
        setStatus(String(error && error.message ? error.message : error), "bad");
      } finally {
        saveBtn.disabled = false;
        saveRunBtn.disabled = false;
      }
    }

    saveBtn.addEventListener("click", () => onSave(false));
    saveRunBtn.addEventListener("click", () => onSave(true));

    loadValues().then(() => setStatus("Loaded.", "ok")).catch((error) => {
      setStatus(String(error && error.message ? error.message : error), "bad");
    });
  </script>
</body>
</html>
