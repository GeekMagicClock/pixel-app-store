<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Team Schedule Settings</title>
  <style>
    body { margin: 0; padding: 12px; font: 14px/1.4 -apple-system, Segoe UI, sans-serif; background: #fffaf2; color: #2f251c; }
    h1 { margin: 0 0 6px; font-size: 16px; }
    .hint { margin: 0 0 10px; color: #6b5a47; font-size: 12px; }
    .row { margin: 0 0 10px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    input, select, button { font: inherit; }
    input, select { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d8c8b3; border-radius: 8px; background: #fff; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { padding: 8px 12px; border: 0; border-radius: 999px; background: #efe2d3; color: #2f251c; }
    button.primary { background: #b8582f; color: #fff; }
    .status { margin-top: 8px; font-size: 12px; min-height: 16px; white-space: pre-wrap; }
    .ok { color: #2f8a4f; }
    .bad { color: #a03224; }
    @media (max-width: 460px) { .split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Team Schedule</h1>
  <p class="hint">Pick your team and schedule view. Team list loads from league data automatically.</p>

  <div class="row">
    <label for="sport">Sport</label>
    <select id="sport"></select>
  </div>

  <div class="row">
    <label for="league">League</label>
    <select id="league"></select>
  </div>

  <div class="row">
    <label for="team">Team Focus</label>
    <select id="team"></select>
  </div>

  <div class="split">
    <div class="row">
      <label for="count">Upcoming Games Shown</label>
      <select id="count">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>
  </div>

  <div class="split">
    <div class="row">
      <label for="rotateSec">Card Switch (seconds)</label>
      <input id="rotateSec" type="number" min="1" max="30" step="1" value="4">
    </div>
    <div class="row">
      <label for="refreshSec">Refresh (seconds)</label>
      <input id="refreshSec" type="number" min="10" max="1800" step="10" value="600">
    </div>
  </div>

  <div class="actions">
    <button id="saveRun" class="primary" type="button">Save & Run</button>
  </div>
  <div id="status" class="status"></div>

  <script>
    const APP_ID = "basketball_schedule";
    const FORCED_SPORT = "basketball";
    const LEAGUES = [{"code":"nba","name":"NBA","teams":[["ATL","Atlanta Hawks","1"],["BOS","Boston Celtics","2"],["BKN","Brooklyn Nets","17"],["CHA","Charlotte Hornets","30"],["CHI","Chicago Bulls","4"],["CLE","Cleveland Cavaliers","5"],["DAL","Dallas Mavericks","6"],["DEN","Denver Nuggets","7"],["DET","Detroit Pistons","8"],["GS","Golden State Warriors","9"],["HOU","Houston Rockets","10"],["IND","Indiana Pacers","11"],["LAC","LA Clippers","12"],["LAL","Los Angeles Lakers","13"],["MEM","Memphis Grizzlies","29"],["MIA","Miami Heat","14"],["MIL","Milwaukee Bucks","15"],["MIN","Minnesota Timberwolves","16"],["NO","New Orleans Pelicans","3"],["NY","New York Knicks","18"],["OKC","Oklahoma City Thunder","25"],["ORL","Orlando Magic","19"],["PHI","Philadelphia 76ers","20"],["PHX","Phoenix Suns","21"],["POR","Portland Trail Blazers","22"],["SAC","Sacramento Kings","23"],["SA","San Antonio Spurs","24"],["TOR","Toronto Raptors","28"],["UTAH","Utah Jazz","26"],["WSH","Washington Wizards","27"]]}];

    const el = {
      sport: document.getElementById("sport"),
      league: document.getElementById("league"),
      team: document.getElementById("team"),
      count: document.getElementById("count"),
      rotateSec: document.getElementById("rotateSec"),
      refreshSec: document.getElementById("refreshSec"),
      saveRun: document.getElementById("saveRun"),
      status: document.getElementById("status")
    };

    function setStatus(msg, cls) {
      el.status.textContent = msg || "";
      el.status.className = "status" + (cls ? " " + cls : "");
    }

    async function api(method, path, payload) {
      const response = await fetch(path, {
        method,
        headers: payload === undefined ? {} : { "Content-Type": "application/json" },
        body: payload === undefined ? undefined : JSON.stringify(payload),
        cache: "no-store"
      });
      const text = await response.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch (_) {}
      if (!response.ok) {
        const detail = json && json.error ? " (" + json.error + ")" : "";
        throw new Error("Request failed " + response.status + detail);
      }
      return json;
    }

    function setOptions(node, options, value) {
      node.innerHTML = "";
      for (const item of options) {
        const opt = document.createElement("option");
        opt.value = item.value;
        opt.textContent = item.label;
        if (item.teamId) opt.teamId = item.teamId;
        node.appendChild(opt);
      }
      if (value != null && value !== "") node.value = value;
    }

        function lockSportField() {
      if (!el.sport) return;
      el.sport.value = FORCED_SPORT;
      el.sport.disabled = true;
      const row = el.sport.closest ? el.sport.closest(".row") : null;
      if (row) row.style.display = "none";
    }

function sportDef() {
      return { leagues: LEAGUES };
    }

    function selectedSportDef() {
      return sportDef();
    }

    function leagueDef() {
      const sport = sportDef();
      const code = el.league.value;
      for (const l of sport.leagues) {
        if (l.code === code) return l;
      }
      return sport.leagues[0];
    }
    async function rebuildTeam(preferredTeam) {
      const league = leagueDef();
      const sourceTeams = (league.teams || []).map(function (x) { return [x[0], x[1], ""]; });
      const options = [{ value: "", label: "No Team Focus" }];
      for (const t of sourceTeams) {
        options.push({ value: t[0], label: t[0] + " - " + t[1], teamId: t[2] || "" });
      }
      setOptions(el.team, options, preferredTeam || "");
      const current = sourceTeams.find(function (x) { return x[0] === (el.team.value || ""); });
      el.team.dataset.teamId = current && current[2] ? current[2] : "";
    }

    function selectedLeagueDef() {
      return leagueDef();
    }

    function clampInt(v, min, max, fallback) {
      const n = Number(v);
      if (!Number.isFinite(n)) return fallback;
      const x = Math.round(n);
      if (x < min) return min;
      if (x > max) return max;
      return x;
    }

    function selectedTeamId() {
      const option = el.team.options[el.team.selectedIndex];
      if (option && option.teamId) return option.teamId;
      return el.team.dataset.teamId || "";
    }

    function collect() {
      lockSportField();
      const rotateSec = clampInt(el.rotateSec.value, 1, 30, 4);
      const refreshSec = clampInt(el.refreshSec.value, 10, 1800, 600);
      return {
        "basketball_schedule.sport": FORCED_SPORT,
        "basketball_schedule.league": el.league.value || "eng.1",
        "basketball_schedule.team": (el.team.value || "").trim().toUpperCase() || null,
        "basketball_schedule.team_id": selectedTeamId() || null,
        "basketball_schedule.count": clampInt(el.count.value, 1, 3, 3),
        "basketball_schedule.rotate_ms": rotateSec * 1000,
        "basketball_schedule.ttl_ms": refreshSec * 1000
      };
    }

    async function saveNow() {
      if (el.saveRun) el.saveRun.disabled = true;
      try {
        const t0 = Date.now();
        setStatus("Saving...");
        const items = collect();
        await api("POST", "/api/system/settings", { items });
        await api("POST", "/api/apps/switch/" + encodeURIComponent(APP_ID), {});
        setStatus("Saved and applied. (" + (Date.now() - t0) + " ms)", "ok");
      } catch (e) {
        setStatus(String(e && e.message || e), "bad");
      } finally {
        if (el.saveRun) el.saveRun.disabled = false;
      }
    }


    async function rebuildLeague(preferredLeague, preferredTeam) {
      const sportDef = selectedSportDef ? selectedSportDef() : (CFG && CFG[FORCED_SPORT]) || null;
      const leagues = (sportDef && Array.isArray(sportDef.leagues)) ? sportDef.leagues : [];
      if (leagues.length && typeof setOptions === "function" && el && el.league) {
        setOptions(el.league, leagues.map(function(l){ return { value: l.code, label: l.name || l.code }; }), preferredLeague || leagues[0].code);
      }
      if (typeof rebuildTeam === "function") {
        await rebuildTeam(preferredTeam || "");
      } else if (typeof rebuildTeamOptions === "function") {
        await rebuildTeamOptions(preferredTeam || "");
      }
    }
    

    async function load() {
      const json = await api("GET", "/api/system/settings");
      const items = json && typeof json.items === "object" ? json.items : {};

      const sportOptions = [{ value: FORCED_SPORT, label: "Basketball" }];
      setOptions(el.sport, sportOptions, FORCED_SPORT);
      lockSportField();
      await rebuildLeague(String(items["basketball_schedule.league"] || ""), String(items["basketball_schedule.team"] || ""));

      el.count.value = String(clampInt(items["basketball_schedule.count"], 1, 3, 3));
      el.rotateSec.value = String(clampInt((Number(items["basketball_schedule.rotate_ms"]) || 4000) / 1000, 1, 30, 4));
      el.refreshSec.value = String(clampInt((Number(items["basketball_schedule.ttl_ms"]) || 600000) / 1000, 10, 1800, 600));
      setStatus("");
    }

    el.sport.addEventListener("change", function () { rebuildLeague("", "").catch(function () {}); });
    el.league.addEventListener("change", function () { rebuildTeam("").catch(function () {}); });
    el.team.addEventListener("change", function () {
      const option = el.team.options[el.team.selectedIndex];
      el.team.dataset.teamId = option && option.teamId ? option.teamId : "";
    });
    if (el.saveRun) el.saveRun.addEventListener("click", saveNow);

    load().catch(function (e) { setStatus(String(e && e.message || e), "bad"); });
  </script>
</body>
</html>
