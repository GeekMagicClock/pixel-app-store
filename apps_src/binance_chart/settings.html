<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Binance Chart Settings</title>
<style>body{margin:0;padding:12px;font:14px/1.4 -apple-system,Segoe UI,sans-serif;background:#fffaf2;color:#2f251c}h1{margin:0 0 10px;font-size:16px}.row{margin:0 0 10px}label{display:block;font-size:12px;font-weight:700;margin-bottom:4px}input,select,button{font:inherit}input,select{width:100%;padding:8px;border:1px solid #d8c8b3;border-radius:8px;background:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap}button{padding:8px 12px;border:0;border-radius:999px;background:#efe2d3}button.primary{background:#b8582f;color:#fff}.status{margin-top:8px;font-size:12px;min-height:16px}.ok{color:#2f8a4f}.bad{color:#a03224}</style>
</head><body><h1>Binance Chart</h1><div id="form"></div><div class="actions"><button id="save">Save</button><button id="saveRun" class="primary">Save & Run</button></div><div id="status" class="status"></div>
<script>const CFG={appId:"binance_chart",fields:[{key:"binance_chart.symbols",label:"Symbols (comma separated)",type:"text",default:"BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT,XRPUSDT,ADAUSDT,DOGEUSDT,TRXUSDT,AVAXUSDT,DOTUSDT",placeholder:"BTCUSDT,ETHUSDT,BNBUSDT"},{key:"binance_chart.interval",label:"Kline Interval",type:"select",default:"1m",options:[["1m","1m"],["5m","5m"],["15m","15m"],["1h","1h"],["4h","4h"],["1d","1d"]]},{key:"binance_chart.chart_type",label:"Chart Type",type:"select",default:"mountain",options:[["mountain","Mountain"],["line","Line"]]},{key:"binance_chart.limit",label:"Kline Samples",type:"number",default:64,min:16,max:64,step:1},{key:"binance_chart.rotate_interval_ms",label:"Rotate Interval (ms)",type:"number",default:10000,min:5000,max:600000,step:1000},{key:"binance_chart.refresh_interval_ms",label:"Refresh Interval (ms)",type:"number",default:10000,min:10000,max:600000,step:1000}]};</script><script src="../_shared/settings_core.js"></script></body></html>
