name: Publish App Store Assets

on:
  push:
    branches:
      - main
    paths:
      - "data_littlefs/apps/**"
      - "scripts/publish_apps.py"
      - "python/store/tools/luac-esp-compat"
      - ".github/workflows/publish-app-store.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build stable catalog
        run: python3 scripts/publish_apps.py --channel stable --zip-url-mode redirect

      - name: Build beta catalog
        run: python3 scripts/publish_apps.py --channel beta --zip-url-mode redirect

      - name: Commit updated store
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- dist/store; then
            echo "No store changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/store
          git commit -m "Update app store assets [skip ci]"
          git push
